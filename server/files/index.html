<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body{
            font-family:"Comic Sans MS",VERDANA,ARIAL,HELVETICA;
            color: black;
        }

        img{
            border-radius: 5%;
            width: 50%;
            height: 50%;
            max-width: 400px;
        }
        img:hover{
            transform: scale(1.01);
        }

        h1{
            font-weight: bold;
            margin: auto;
            text-align: center;
        }
        article{
            color: white;
            background-color: #4a412a;
            border-radius: 5%;
            margin: 50px;
            padding: 5%;
            box-shadow: 10px 5px 5px grey;
        }
        span{
            margin-right: 5px;
        }
        span.genre{
            background-color: #4a41ff;
            padding: 5px;
            border-radius: 20px;
            border: red;
            border-width: 10px;
            display: inline-block;
            color: white;
        }
        span.genre:hover{
            background-color: black;
            transform: scale(2);
        }

    </style>
    <script>
        function CreditFormatter(article, title, people){
            const h3 = document.createElement("h3");
            h3.textContent = title;
            article.append(h3);

            const ul = document.createElement("ul");
            people.forEach(p => {
                const li = document.createElement("li");
                li.textContent = p;
                ul.append(li);
            });
            article.append(ul);
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */ 
                    const movies = JSON.parse(xhr.responseText);

                    movies.forEach(movie => {

                        const article = document.createElement("article");

                        //Poster
                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        article.append(poster);

                        //Titel
                        const title = document.createElement("h2");
                        title.textContent = movie.Title;
                        article.append(title);
                        
                        //Runtime and Release date
                        const info = document.createElement("p");
                        if(movie.Runtime>=60){
                            let returnHour = Math.floor(movie.Runtime / 60);
                            let returnMin = movie.Runtime % 60;
                            info.append(`Runtime ${returnHour}h ${returnMin}m`)
                        }else{
                            info.append(`Runtime ${movie.Runtime}m`)
                        }
                        info.append(` \u2022 Released on ${movie.Released}`);
                        article.append(info);

                        //Genres
                        const genre = document.createElement("p");
                        movie.Genres.forEach(genreName => {
                            const span = document.createElement("span");
                            span.className = "genre";
                            span.textContent = genreName;
                            genre.append(span);
                        });
                        article.append(genre);

                        //Plot
                        const plot = document.createElement("p");
                        plot.textContent = movie.Plot;
                        article.append(plot);

                        //Credits
                        CreditFormatter(article, "Directors", movie.Directors)
                        CreditFormatter(article, "Writers", movie.Writers)
                        CreditFormatter(article, "Actors", movie.Actors)

                        //Ratings
                        const rating = document.createElement("h3");
                        rating.textContent = "Ratings";
                        article.append(rating)
                        const ratingText = document.createElement("p");
                        if(movie.Metascore !== null && movie.imdbRating !== null){
                            ratingText.append(`IMDB rates this movie with ${movie.imdbRating} and Metacritic with ${movie.Metascore}`);
                        } else if(movie.Metascore !== null){
                            ratingText.append(`Metacritic rates this movie with ${movie.Metascore}`);
                        }
                        else if(movie.imdbRating !== null){
                            ratingText.append(`IMDB rates this movie with ${movie.imdbRating}`);
                        }else{
                            ratingText.append(`No ratings yet`);
                        }
                        article.append(ratingText);

                        bodyElement.append(article);  
                    });

                    
                } else {
                    console.log("FAIL")
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
    <h1>Movie catalog!</h1>
</body>

</html>
